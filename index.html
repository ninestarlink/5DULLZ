<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任务管理系统 - 登录</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>📋 任务管理系统</h1>
                <p>智能任务分配与管理平台</p>
            </div>
            
            <div class="login-tabs">
                <button class="tab-btn active" data-role="admin">管理员登录</button>
                <button class="tab-btn" data-role="employee">员工登录</button>
            </div>
            
            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="username" placeholder="请输入用户名" required>
                </div>
                
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="password" placeholder="请输入密码" required>
                </div>
                
                <div class="quick-login" id="quickLogin">
                    <p>快速登录：</p>
                    <div class="quick-btns">
                        <button type="button" class="quick-btn" data-user="admin">管理员</button>
                        <button type="button" class="quick-btn" data-user="linshiyu">林诗雨</button>
                        <button type="button" class="quick-btn" data-user="chenxingchen">陈星辰</button>
                        <button type="button" class="quick-btn" data-user="suxiaoyue">苏晓月</button>
                    </div>
                </div>
                
                <button type="submit" class="login-btn">登录</button>
                
                <div id="errorMessage" style="display: none; margin-top: 16px; padding: 12px; background: rgba(239, 68, 68, 0.1); border-radius: 8px; color: #ef4444; font-size: 14px; text-align: center;"></div>
            </form>
        </div>
    </div>
    
    <script src="api-config.js"></script>
    <script src="login.js"></script>
</body>
</html>
