        :root {
            --bg-color: #fbfbfd;
            --card-bg: rgba(255, 255, 255, 0.65);
            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --accent-color: #0071e3;
            --success-color: #34c759;
            --warning-color: #ff9500;
            --danger-color: #ff3b30;
            --border-radius: 24px;
            --shadow: 0 18px 40px -10px rgba(0, 0, 0, 0.08);
            --transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            background-color: #f0f6ff;
            /* Premium Royal Blue Gradient - No Teal/Cyan */
            background-image: 
                radial-gradient(at 0% 0%, hsla(220,100%,92%,1) 0, transparent 55%), 
                radial-gradient(at 100% 0%, hsla(230,100%,94%,1) 0, transparent 55%),
                radial-gradient(at 100% 100%, hsla(210,100%,93%,1) 0, transparent 55%),
                radial-gradient(at 0% 100%, hsla(240,100%,95%,1) 0, transparent 55%);
            color: var(--text-primary);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            position: relative;
        }
        
        /* Interactive Background Glow - Refined Blue */
        #glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, rgba(60, 100, 255, 0.25), transparent 65%);
            pointer-events: none;
            z-index: -1;
            transform: translate(-50%, -50%);
            transition: transform 0.1s cubic-bezier(0.1, 0.9, 0.2, 1);
            border-radius: 50%;
            filter: blur(40px);
            mix-blend-mode: multiply;
            /* Fix mobile overflow caused by fixed large element sometimes affecting scroll width */
            max-width: 100vw;
            max-height: 100vh;
        }

        /* Mobile Adaptation */
        @media (max-width: 768px) {
            body {
                overflow-x: hidden;
                width: 100%;
            }
            
            header {
                padding: 1rem 1.5rem;
                flex-direction: column;
                align-items: flex-start;
                gap: 1rem;
                width: 100%;
            }

            .container {
                padding: 0 1rem;
                margin: 1.5rem auto;
                width: 100%;
                overflow-x: hidden;
            }
            
            .grid {
                grid-template-columns: 1fr; /* Single column on mobile */
                gap: 1.5rem;
                width: 100%;
            }
            
            .card {
                padding: 1.5rem;
                width: 100%;
            }
            
            h1 {
                font-size: 22px;
            }
        }

        /* KPI Button in Header */
        .kpi-btn-header {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(0, 113, 227, 0.3);
        }
        
        .kpi-btn-header:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 16px rgba(0, 113, 227, 0.4);
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        
        .modal {
            background: rgba(255, 255, 255, 0.9);
            width: 90%;
            max-width: 600px;
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            transform: scale(0.9) translateY(20px);
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.6);
        }
        
        .modal-overlay.active .modal {
            transform: scale(1) translateY(0);
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            padding-bottom: 1rem;
        }
        
        .modal-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
        }
        
        .modal-close {
            background: #f2f2f7;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            color: var(--text-secondary);
            font-size: 20px;
            line-height: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        
        .modal-close:hover {
            background: #e5e5ea;
            color: var(--text-primary);
        }
        
        .modal-body {
            font-size: 15px;
            line-height: 1.6;
            color: var(--text-primary);
            white-space: pre-wrap;
            max-height: 60vh;
            overflow-y: auto;
        }
        
        /* Scrollbar for modal */
        .modal-body::-webkit-scrollbar {
            width: 6px;
        }
        .modal-body::-webkit-scrollbar-thumb {
            background: rgba(0,0,0,0.1);
            border-radius: 3px;
        }

        /* Loading Animation Overlay */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease-out;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0,0,0,0.1);
            border-radius: 50%;
            border-top-color: var(--accent-color);
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }

        header {
            background-color: rgba(255, 255, 255, 0.7);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 1.5rem 3rem;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: slideDown 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            transform: translateY(-100%);
        }

        @keyframes slideDown {
            to { transform: translateY(0); }
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin: 0;
            letter-spacing: -0.01em;
            background: linear-gradient(135deg, #1d1d1f 0%, #434344 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            max-width: 1600px;
            margin: 3rem auto;
            padding: 0 3rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 2.5rem;
            perspective: 1000px;
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            padding: 2rem;
            transition: var(--transition);
            opacity: 0;
            transform: translateY(50px) scale(0.95) rotateX(5deg);
            border: 1px solid rgba(255,255,255,0.4);
            backdrop-filter: blur(20px);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0,0,0,0.05), transparent);
        }

        .card:hover {
            transform: translateY(-10px) scale(1.02) rotateX(0);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.12);
            border-color: rgba(255,255,255,0.8);
            background: rgba(255, 255, 255, 0.85);
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0) scale(1) rotateX(0);
            }
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            padding-bottom: 1rem;
        }

        .name {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.01em;
            color: var(--text-primary);
        }

        .kpi-badge {
            font-size: 13px;
            background: rgba(0,0,0,0.04);
            color: var(--text-secondary);
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid rgba(0,0,0,0.02);
            font-weight: 500;
        }
        
        .kpi-badge:hover {
            background: rgba(0,0,0,0.08);
            transform: scale(1.05);
            color: var(--text-primary);
        }

        .kpi-detail {
            font-size: 14px;
            color: var(--text-secondary);
            background: rgba(0,0,0,0.02);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            line-height: 1.6;
            display: none;
            white-space: pre-wrap;
            border-left: 3px solid var(--accent-color);
            animation: expandHeight 0.4s ease-out;
        }

        @keyframes expandHeight {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .section-title {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            margin: 1.5rem 0 0.8rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px currentColor; /* Keep glow but lighter context handles it well */
        }
        
        .dot.high { background-color: var(--danger-color); color: rgba(255, 59, 48, 0.3); }
        .dot.medium { background-color: var(--warning-color); color: rgba(255, 149, 0, 0.3); }
        .dot.low { background-color: var(--success-color); color: rgba(52, 199, 89, 0.3); }

        .term-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .term-item {
            margin-bottom: 1rem;
        }

        .term-header {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            margin-bottom: 6px;
        }

        .term-name {
            font-weight: 500;
            color: var(--text-primary);
        }

        .term-rate {
            color: var(--text-secondary);
            font-variant-numeric: tabular-nums;
            font-weight: 600;
        }

        .progress-bg {
            height: 6px;
            background: rgba(0,0,0,0.06);
            border-radius: 3px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            border-radius: 3px;
            width: 0;
            transition: width 2s cubic-bezier(0.22, 1, 0.36, 1);
            position: relative;
        }
        
        .progress-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
            transform: translateX(-100%);
            animation: shimmer 5s infinite; /* 5s total cycle */
        }
        
        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            20% { transform: translateX(100%); } /* Fast shimmer (1s) */
            100% { transform: translateX(100%); } /* Wait for rest (4s) */
        }

        .high-bar { background: linear-gradient(90deg, #ff453a, #ff6d64); box-shadow: 0 2px 8px rgba(255, 69, 58, 0.25); }
        .medium-bar { background: linear-gradient(90deg, #ff9f0a, #ffb340); box-shadow: 0 2px 8px rgba(255, 159, 10, 0.25); }
        .low-bar { background: linear-gradient(90deg, #30d158, #66d983); box-shadow: 0 2px 8px rgba(48, 209, 88, 0.25); }

        footer {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
            font-size: 13px;
            opacity: 0;
            animation: fadeIn 1s ease-out 1.5s forwards;
        }
        
        @keyframes fadeIn { to { opacity: 1; } }

    </style>
</head>

    "terms": {
      "low": [
        { "term": "ULLZ 边缘节点", "rate": 44 },

        { "term": "ULLZ 网络优化", "rate": 30 },

    function createCard(person, index) {
        const card = document.createElement('div');
        card.className = 'card';
        // Increased stagger delay for more dramatic entrance
        card.style.animation = `fadeUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards`;
        card.style.animationDelay = `${0.5 + index * 0.15}s`;

        const highTerms = renderTerms(person.terms.high, 'high');
        const mediumTerms = renderTerms(person.terms.medium, 'medium');
        const lowTerms = renderTerms(person.terms.low, 'low');

        card.innerHTML = `
            <div class="card-header">
                <div class="name">${person.name}</div>
            </div>
            
            ${highTerms ? `<div class="section-title"><span class="dot high"></span>高权重词条</div>${highTerms}` : ''}
            ${mediumTerms ? `<div class="section-title"><span class="dot medium"></span>中权重词条</div>${mediumTerms}` : ''}
            ${lowTerms ? `<div class="section-title"><span class="dot low"></span>低权重词条</div>${lowTerms}` : ''}
        `;
        return card;
    }

    function renderTerms(terms, type) {
        if (!terms || terms.length === 0) return '';
        
        let html = '<ul class="term-list">';
        terms.forEach(item => {
            html += `
                <li class="term-item">
                    <div class="term-header">
                        <span class="term-name">${item.term}</span>
                        <span class="term-rate">${item.rate}%</span>
                    </div>
                    <div class="progress-bg">
                        <div class="progress-bar ${type}-bar" style="width: 0%" data-width="${item.rate}%"></div>
                    </div>
                </li>
            `;
        });
        html += '</ul>';
        return html;
    }

    function showKpiModal() {
        const modal = document.getElementById('kpiModal');
        modal.classList.add('active');
    }
    
    function closeKpiModal() {
        const modal = document.getElementById('kpiModal');
        modal.classList.remove('active');
    }
    
    // Close modal when clicking outside
    document.getElementById('kpiModal').addEventListener('click', (e) => {
        if (e.target === e.currentTarget) {
            closeKpiModal();
        }
    });

    // Render
    const grid = document.getElementById('dashboard-grid');
    geoData.forEach((person, index) => {
        grid.appendChild(createCard(person, index));
    });

    // Remove loader
    window.addEventListener('load', () => {
        setTimeout(() => {
            const loader = document.getElementById('loader');
            loader.style.opacity = '0';
            setTimeout(() => {
                loader.style.display = 'none';
            }, 800);
        }, 1000); // Fake loading time
    });

    // Trigger animations
    setTimeout(() => {
        document.querySelectorAll('.progress-bar').forEach(bar => {
            // Add random delay for more organic feel
            setTimeout(() => {
                bar.style.width = bar.getAttribute('data-width');
            }, Math.random() * 500);
        });
    }, 1500);

    // Mouse Glow Effect
    document.addEventListener('mousemove', (e) => {
        const glow = document.getElementById('glow');
        glow.style.transform = `translate(${e.clientX}px, ${e.clientY}px) translate(-50%, -50%)`;
    });

</script>
