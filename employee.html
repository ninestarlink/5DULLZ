<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>员工工作台 - 任务管理系统</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="employee.css">
</head>
<body>
    <div class="app-container">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>📋 员工工作台</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-page="my-tasks">
                    <span class="icon">📋</span>
                    <span>我的任务</span>
                </a>
                <a href="#" class="nav-item" data-page="profile">
                    <span class="icon">👤</span>
                    <span>个人资料</span>
                </a>
                <a href="#" class="nav-item" data-page="notifications">
                    <span class="icon">🔔</span>
                    <span>通知中心</span>
                    <span class="badge" style="margin-left: auto; background: var(--danger); color: white; padding: 2px 8px; border-radius: 10px; font-size: 11px;">3</span>
                </a>
            </nav>
        </aside>
        
        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 顶部导航 -->
            <header class="top-nav">
                <div class="top-nav-left">
                    <h1 id="pageTitle">我的任务</h1>
                </div>
                <div class="top-nav-right">
                    <button class="nav-icon-btn" id="notificationBtn">
                        <span>🔔</span>
                        <span class="badge">3</span>
                    </button>
                    <div class="user-menu" id="userMenu">
                        <div class="user-avatar" id="userAvatar">张</div>
                        <div class="user-info">
                            <div class="user-name" id="userName">张三</div>
                            <div class="user-role">内容专员</div>
                        </div>
                        <span style="margin-left: 8px;">▼</span>
                    </div>
                </div>
            </header>
            
            <!-- 内容区域 -->
            <div class="content-area" id="contentArea">
                <!-- 动态加载内容 -->
            </div>
        </main>
    </div>
    
    <!-- 任务详情模态框 -->
    <div class="modal" id="taskDetailModal">
        <div class="modal-content" style="max-width: 800px;">
            <div class="modal-header">
                <h2 class="modal-title">📋 任务详情</h2>
                <button class="modal-close" onclick="closeTaskDetail()">×</button>
            </div>
            <div class="modal-body" id="taskDetailContent">
                <!-- 动态加载 -->
            </div>
        </div>
    </div>
    
    <!-- 用户切换下拉菜单 -->
    <div class="dropdown-menu" id="userDropdown">
        <div class="dropdown-item" data-user="linshiyu">
            <div class="dropdown-avatar">林</div>
            <div>
                <div class="dropdown-name">林诗雨</div>
                <div class="dropdown-role">高级内容专员</div>
            </div>
        </div>
        <div class="dropdown-item" data-user="chenxingchen">
            <div class="dropdown-avatar">陈</div>
            <div>
                <div class="dropdown-name">陈星辰</div>
                <div class="dropdown-role">社区运营专员</div>
            </div>
        </div>
        <div class="dropdown-item" data-user="suxiaoyue">
            <div class="dropdown-avatar">苏</div>
            <div>
                <div class="dropdown-name">苏晓月</div>
                <div class="dropdown-role">内容编辑</div>
            </div>
        </div>
        <div class="dropdown-item" data-user="jiangyifan">
            <div class="dropdown-avatar">江</div>
            <div>
                <div class="dropdown-name">江逸凡</div>
                <div class="dropdown-role">新媒体专员</div>
            </div>
        </div>
        <div class="dropdown-divider"></div>
        <div class="dropdown-item" onclick="window.location.href='index.html'">
            <span>🚪</span>
            <span>退出登录</span>
        </div>
    </div>
    
    <script src="employee-data.js"></script>
    <script src="employee.js"></script>
</body>
</html>
